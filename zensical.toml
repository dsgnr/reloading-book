[project]
site_name = "Reloading Book"
site_url = "https://dsgnr.github.io/reloading-book"
site_author = "dsgnr"
site_description = "My notes and documentation for F-class reloading."

repo_name = "dsgnr/reloading-book"
repo_url = "https://github.com/dsgnr/reloading-book"

copyright = """Copyright &copy; <script>document.write(new Date().getFullYear())</script>"""

extra_css = ["static/css/custom.css"]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
# Preserve the Material for MkDocs look and feel we had previously.
variant = "classic"
features = [
    "content.footnote.tooltips",
    "content.tabs.link",
    "navigation.footer",
    "navigation.indexes",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

# Light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "black"
accent = "indigo"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

# Dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "indigo"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

# ----------------------------------------------------------------------------
# Plugins
# ----------------------------------------------------------------------------
[project.plugins.offline]

# ----------------------------------------------------------------------------
# Extras
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/dsgnr"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]
